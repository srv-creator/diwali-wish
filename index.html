<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diwali Wish</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="/images/happy-diwali-festival-lights_1308-121652.avif"
      type="image/x-icon"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Salsa&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main">
      <img class="jhumar" src="/images/design-5 1.png" alt="jhumar" />
      <p>
        Hi,<br />
        You mean the world to me... So this Diwali, <br />
        I made something for you!
      </p>
      <div class="music">
        <img src="/images/music-logo.svg" alt="music logo" />
        <span>Soulful Music</span>
        <img src="/images/music-rate.svg" alt="music wave" />
        <audio
          controls autoplay
          src="/images/Yeh Dil Jo Barson Se Tha Khaal-Downringtone.com.mp3"
        ></audio>
      </div>
      <img class="hide-img" src="/images/deepak 1.png" alt="deepak" />
      <img class="deepak" src="/images/deepak 1.png" alt="deepak" />
    </div>
    <div class="layer2">
        <img src="/images/lakshmi maa and ganesh ji 1.png" alt="">
    </div>
  </body>
</html>
